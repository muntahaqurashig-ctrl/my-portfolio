<!DOCTYPE html>
<html>

<head>

<title>Expense Tracker</title>

<link rel="stylesheet"
href="expense.css">

</head>

<body>


<div class="container">


<h1>Expense Tracker</h1>



<input
type="text"
id="expenseName"
placeholder="Expense Name">


<input
type="number"
id="expenseAmount"
placeholder="Amount">



<button onclick="addExpense()">

Add Expense

</button>



<ul id="expenseList"></ul>



<h2 id="total">

Total : $0

</h2>



</div>



<script src="expense.js"></script>


</body>

</html>
