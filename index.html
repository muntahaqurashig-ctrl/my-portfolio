<!DOCTYPE html>
<html>

<head>
    <title>Dark Mode</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Welcome Muntaha!</h1>

    <p>Click the button below to change the theme.</p>

    <button onclick="toggleMode()">
        Dark Mode
    </button>

    <script>

        function toggleMode() {

            document.body.classList.toggle("dark");

        }

    </script>

</body>

</html>
